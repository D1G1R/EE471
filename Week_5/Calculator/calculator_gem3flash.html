<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            /* font-family: Arial, sans-serif; */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .calculator {
            background-color: #0070c0;
            padding: 10px;
            width: 450px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 5px solid #0070c0;
        }
        #display {
            grid-column: span 4;
            background-color: white;
            color: black;
            font-size: 48px;
            text-align: right;
            padding: 10px;
            margin-bottom: 5px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            overflow: hidden;
            border: 1px solid #0070c0;
        }
        button {
            background-color: #808080;
            color: white;
            border: none;
            padding: 15px;
            font-size: 42px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 1 / 1;
            margin: 5px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        button:active {
            opacity: 0.8;
        }
        button.operator {
            background-color: #a6a6a6;
        }
        button.equals {
            background-color: #004b8d;
        }
        /* Specific symbol formatting to match image */
        .symbol {
            font-size: 48px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div id="display">0</div>
        
        <button onclick="appendNumber('7')">7</button>
        <button onclick="appendNumber('8')">8</button>
        <button onclick="appendNumber('9')">9</button>
        <button class="operator" onclick="setOperator('/')"><span class="symbol">÷</span></button>
        
        <button onclick="appendNumber('4')">4</button>
        <button onclick="appendNumber('5')">5</button>
        <button onclick="appendNumber('6')">6</button>
        <button class="operator" onclick="setOperator('*')"><span class="symbol">×</span></button>
        
        <button onclick="appendNumber('1')">1</button>
        <button onclick="appendNumber('2')">2</button>
        <button onclick="appendNumber('3')">3</button>
        <button class="operator" onclick="setOperator('-')"><span class="symbol">−</span></button>
        
        <button onclick="appendNumber('0')">0</button>
        <button onclick="appendNumber('.')">.</button>
        <button class="equals" onclick="calculate()"><span class="symbol">=</span></button>
        <button class="operator" onclick="setOperator('+')"><span class="symbol">+</span></button>
    </div>

    <script>
        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let shouldResetDisplay = false;

        const display = document.getElementById('display');

        function updateDisplay() {
            display.textContent = currentInput;
        }

        function appendNumber(number) {
            if (currentInput === '0' || shouldResetDisplay) {
                currentInput = number;
                shouldResetDisplay = false;
            } else {
                if (number === '.' && currentInput.includes('.')) return;
                currentInput += number;
            }
            updateDisplay();
        }

        function setOperator(op) {
            if (operator !== null) {
                calculate();
            }
            previousInput = currentInput;
            operator = op;
            shouldResetDisplay = true;
        }

        function calculate() {
            if (operator === null || shouldResetDisplay) return;
            
            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);

            if (isNaN(prev) || isNaN(current)) return;

            switch (operator) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    result = prev / current;
                    break;
                default:
                    return;
            }

            currentInput = result.toString();
            operator = null;
            shouldResetDisplay = true;
            updateDisplay();
        }
    </script>
</body>
</html>
