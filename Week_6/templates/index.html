<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech-to-Text</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .container { border: 2px solid #ce4b4b; border-radius: 10px; padding: 20px; }
        .box { border: 1px solid #ddd; padding: 15px; border-radius: 5px; margin-bottom: 15px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; margin-top: 10px; }
        .btn-transcribe { background-color: #ce4b4b; color: white; width: 100%;}
        .status { margin-top: 10px; padding: 10px; display: none; border-radius: 5px;}
        .success { background-color: #e8f5e9; color: #2e7d32; }
        .error { background-color: #ffebee; color: #c62828; }
        textarea { width: 100%; height: 100px; padding: 10px; box-sizing: border-box; margin-top: 10px;}
    </style>
</head>
<body>

<div class="container">
    <h2>🎤 Speech-to-Text</h2>
    <p>Powered by Azure Cognitive Services</p>
    
    <div class="box">
        <label for="audioFile">Upload audio to convert to text (.wav format):</label><br><br>
        <input type="file" id="audioFile" accept="audio/wav">
    </div>

    <button class="btn-transcribe" onclick="transcribeAudio()">Transcribe Audio</button>

    <div id="statusMessage" class="status"></div>

    <div class="box" style="margin-top: 15px;">
        <strong>Transcription:</strong>
        <textarea id="transcriptionResult" readonly placeholder="Result will appear here..."></textarea>
    </div>
</div>

<script>
    async function transcribeAudio() {
        const fileInput = document.getElementById('audioFile');
        const statusDiv = document.getElementById('statusMessage');
        const resultBox = document.getElementById('transcriptionResult');

        if (fileInput.files.length === 0) {
            statusDiv.textContent = 'Please choose an audio file first.';
            statusDiv.className = 'status error';
            statusDiv.style.display = 'block';
            return;
        }

        statusDiv.textContent = 'Transcribing... Please wait.';
        statusDiv.className = 'status';
        statusDiv.style.display = 'block';
        resultBox.value = '';

        const formData = new FormData();
        formData.append('audio', fileInput.files[0]);

        try {
            const response = await fetch('/transcribe', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (response.ok) {
                statusDiv.textContent = data.message;
                statusDiv.className = 'status success';
                resultBox.value = data.text;
            } else {
                statusDiv.textContent = data.error;
                statusDiv.className = 'status error';
            }
        } catch (error) {
            statusDiv.textContent = 'Network or server error occurred.';
            statusDiv.className = 'status error';
        }
    }
</script>

</body>
</html>
