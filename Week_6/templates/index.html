<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-Speech</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .container { border: 2px solid #5a4bce; border-radius: 10px; padding: 20px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; box-sizing: border-box;}
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; }
        .btn-synth { background-color: #5a4bce; color: white; }
        .btn-clear { background-color: #f1f1f1; color: black; }
        .status { margin-top: 10px; padding: 10px; display: none; border-radius: 5px;}
        .success { background-color: #e8f5e9; color: #2e7d32; }
        .error { background-color: #ffebee; color: #c62828; }
        .audio-container { margin-top: 20px; border: 1px solid #ddd; padding: 15px; border-radius: 5px; display: none;}
        audio { width: 100%; margin-top: 10px;}
    </style>
</head>
<body>

<div class="container">
    <h2>🎤 Text-to-Speech</h2>
    <p>Powered by Azure Cognitive Services</p>
    
    <label for="textInput">Enter text to convert to speech:</label>
    <textarea id="textInput" placeholder="Hello, EE471 class"></textarea>
    
    <div>
        <button class="btn-synth" onclick="synthesizeSpeech()">Synthesize Speech</button>
        <button class="btn-clear" onclick="clearText()">Clear</button>
    </div>

    <div id="statusMessage" class="status"></div>

    <div id="audioSection" class="audio-container">
        <strong>Generated Audio:</strong>
        <audio id="audioPlayer" controls></audio>
        <br><br>
        <a id="downloadLink" href="#" download="generated_audio.wav" style="display: block; text-align: center; background: #2196F3; color: white; padding: 10px; text-decoration: none; border-radius: 5px;">Download Audio</a>
    </div>
</div>

<script>
    function clearText() {
        document.getElementById('textInput').value = '';
        document.getElementById('statusMessage').style.display = 'none';
        document.getElementById('audioSection').style.display = 'none';
    }

    async function synthesizeSpeech() {
        const text = document.getElementById('textInput').value;
        const statusDiv = document.getElementById('statusMessage');
        const audioSection = document.getElementById('audioSection');
        const audioPlayer = document.getElementById('audioPlayer');
        const downloadLink = document.getElementById('downloadLink');

        if (!text) {
            statusDiv.textContent = 'Please enter some text.';
            statusDiv.className = 'status error';
            statusDiv.style.display = 'block';
            return;
        }

        statusDiv.textContent = 'Synthesizing... Please wait.';
        statusDiv.className = 'status';
        statusDiv.style.display = 'block';
        audioSection.style.display = 'none';

        try {
            const response = await fetch('/synthesize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });

            const data = await response.json();

            if (response.ok) {
                statusDiv.textContent = data.message;
                statusDiv.className = 'status success';
                
                audioPlayer.src = data.audio_url;
                downloadLink.href = data.audio_url;
                audioSection.style.display = 'block';
            } else {
                statusDiv.textContent = data.error;
                statusDiv.className = 'status error';
            }
        } catch (error) {
            statusDiv.textContent = 'Network or server error occurred.';
            statusDiv.className = 'status error';
        }
    }
</script>

</body>
</html>
